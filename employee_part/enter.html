<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход для сотрудников — Центр «Jas Urpaq»</title>
    <link rel="stylesheet" href="../index.css">
</head>
<body>
    <div class="login-screen">
        <div class="login-card">
            <a href="../index.html" class="brand"><img class="brand-logo" src="../logo.jpg" alt="Логотип фонда Jas Urpaq" width="26" height="26">Jas Urpaq</a>
            <span class="eyebrow">Доступ для сотрудников</span>

            <h2 style="margin-bottom: 6px;">Вход</h2>
            <p style="color: var(--gray-mid); font-size: 13.5px; margin-bottom: 8px;">Используйте свой рабочий логин для доступа к внутренним инструментам.</p>

            <form class="login-form" onsubmit=handleLogin(event)>
                <div class="field">
                    <label for="login-email">Логин / Email</label>
                    <input type="text" id="login-email" placeholder="name@Eventum-center.ru" required autocomplete="username">
                </div>
                <div class="field">
                    <label for="login-password">Пароль</label>
                    <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-solid btn-block">Войти</button>
            </form>

            <a href="../index.html" class="login-back">← Назад на главную</a>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault(); // Чтобы не было перезагрузки страницы
            fetch("http://localhost:8000/enter",{
                method : "POST",
                headers :{"Content-Type":"application/json" },
                body:JSON.stringify({
                    login    : document.getElementById("login-email").value,
                    password : document.getElementById("login-password").value 
                })
            }).then(
                data => data.json()
            )
            .then(
                data =>{
                if(data.answer== "Error"){
                    console.log("Error occured");
                }else if(data.answer){
                    console.log("Entered!");
                }else{
                    console.log("Did nor succeed");
                }
            })
        }
    </script>
</body>
</html>
<!-- mobile meta already present, login card is naturally mobile-friendly -->
